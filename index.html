<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Antigravity Vector — a professional in-browser SVG vector graphics editor with Rust/WASM rendering engine">
    <title>Antigravity Vector — Pro SVG Editor</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Block browser zoom
        window.addEventListener('wheel', (e) => {
            if (e.ctrlKey || e.metaKey) e.preventDefault();
        }, { passive: false, capture: true });
    </script>
    <script src="https://unpkg.com/lucide@0.460.0"></script>
    <script src="/canvaskit.js"></script>
    <script type="module" src="/src/main.ts"></script>
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div id="breadcrumb-bar" class="breadcrumb-bar">
                <!-- Breadcrumb items injected by JS -->
            </div>
            <div class="history-controls">
                <button id="undo-btn" class="zoom-btn" title="Undo (⌘Z)"><i data-lucide="undo-2"></i></button>
                <button id="redo-btn" class="zoom-btn" title="Redo (⌘⇧Z)"><i data-lucide="redo-2"></i></button>
            </div>
            <button id="import-svg" class="header-btn header-btn-secondary">Import SVG</button>
            <button id="export-png" class="header-btn header-btn-secondary">Export PNG</button>
            <button id="export-svg" class="header-btn header-btn-primary">Export SVG</button>
            <div class="zoom-controls">
                <button id="zoom-out" class="zoom-btn" title="Zoom Out (−)">−</button>
                <div id="zoom-level" class="zoom-display">100%</div>
                <button id="zoom-in" class="zoom-btn" title="Zoom In (+)">+</button>
                <button id="zoom-fit" class="zoom-btn" title="Fit to Artboard (Shift+1)">⊡</button>
            </div>
        </header>

        <main id="main-layout">
            <aside id="layers-panel">
                <div class="panel-section layers-section">
                    <div class="panel-section-header" data-section="layers">
                        <span class="chevron">▾</span>
                        <span class="section-title">Layers</span>
                    </div>
                    <div id="layer-list" data-section-body="layers">
                        <!-- Layers injected by JS -->
                    </div>
                </div>
            </aside>

            <nav id="toolbar">
                <!-- Tool rail rendered by src/toolbar.ts -->
            </nav>

            <section id="canvas-container">
                <canvas id="editor-canvas"></canvas>
            </section>

            <aside id="side-panel">
                <div class="properties-scroll">
                <!-- TRANSFORM -->
                <div class="panel-section">
                    <div class="panel-section-header" data-section="transform">
                        <span class="chevron">▾</span>
                        <span class="section-title">Transform</span>
                    </div>
                    <div class="panel-section-body" data-section-body="transform">
                        <div class="dim-grid">
                            <div class="dim-input">
                                <span class="dim-label" data-scrub="prop-x" title="X position">X</span>
                                <input type="number" id="prop-x" value="0" step="1">
                            </div>
                            <div class="dim-input">
                                <span class="dim-label" data-scrub="prop-y" title="Y position">Y</span>
                                <input type="number" id="prop-y" value="0" step="1">
                            </div>
                            <span></span>
                            <div class="dim-input">
                                <span class="dim-label" data-scrub="prop-w" title="Width">W</span>
                                <input type="number" id="prop-w" value="0" step="1" min="0">
                            </div>
                            <div class="dim-input">
                                <span class="dim-label" data-scrub="prop-h" title="Height">H</span>
                                <input type="number" id="prop-h" value="0" step="1" min="0">
                            </div>
                            <button id="aspect-lock" class="dim-icon-btn" title="Constrain proportions">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                            </button>
                            <div class="dim-input">
                                <span class="dim-label" data-scrub="prop-rotation" title="Rotation">
                                    <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"><path d="M2.5 1.5v8h8"/><path d="M6.7 9.5a4.2 4.2 0 0 0-4.2-4.2"/></svg>
                                </span>
                                <input type="number" id="prop-rotation" value="0" step="1">
                                <span class="dim-unit">°</span>
                            </div>
                            <div class="dim-input" id="corner-radius-cell">
                                <span class="dim-label" data-scrub="prop-corner-radius" title="Corner radius">
                                    <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"><path d="M2.5 10.5V7A4.5 4.5 0 0 1 7 2.5h3.5"/></svg>
                                </span>
                                <input type="number" id="prop-corner-radius" value="0" step="1" min="0">
                            </div>
                            <span></span>
                            <div class="dim-input">
                                <span class="dim-label" data-scrub="prop-skew-x" title="Skew X">
                                    <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"><path d="M4.5 3h6l-3 6h-6z"/></svg>
                                </span>
                                <input type="number" id="prop-skew-x" value="0" step="1">
                                <span class="dim-unit">°</span>
                            </div>
                            <div class="dim-input">
                                <span class="dim-label" data-scrub="prop-skew-y" title="Skew Y">
                                    <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"><path d="M3 7.5v-6l6 3v6z"/></svg>
                                </span>
                                <input type="number" id="prop-skew-y" value="0" step="1">
                                <span class="dim-unit">°</span>
                            </div>
                            <span></span>
                            <div class="dim-input">
                                <span class="dim-label" data-scrub="prop-scale-x" title="Scale X (negative = flipped)">
                                    <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 6h9M3.5 4l-2 2 2 2M8.5 4l2 2-2 2"/></svg>
                                </span>
                                <input type="number" id="prop-scale-x" value="100" step="1">
                                <span class="dim-unit">%</span>
                            </div>
                            <div class="dim-input">
                                <span class="dim-label" data-scrub="prop-scale-y" title="Scale Y (negative = flipped)">
                                    <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"><path d="M6 1.5v9M4 3.5l2-2 2 2M4 8.5l2 2 2-2"/></svg>
                                </span>
                                <input type="number" id="prop-scale-y" value="100" step="1">
                                <span class="dim-unit">%</span>
                            </div>
                            <span></span>
                            <div class="dim-actions">
                                <button id="rotate-ccw-btn" class="dim-icon-btn" title="Rotate 90° counterclockwise"></button>
                                <button id="rotate-cw-btn" class="dim-icon-btn" title="Rotate 90° clockwise"></button>
                                <button id="flip-h-btn" class="dim-icon-btn" title="Flip horizontal"></button>
                                <button id="flip-v-btn" class="dim-icon-btn" title="Flip vertical"></button>
                                <button id="flatten-btn" class="dim-icon-btn" title="Flatten transform into geometry (⌘E)"></button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- TYPOGRAPHY (Text nodes only) -->
                <div class="panel-section" id="typography-section" style="display:none;">
                    <div class="panel-section-header" data-section="typography">
                        <span class="chevron">▾</span>
                        <span class="section-title">Typography</span>
                    </div>
                    <div class="panel-section-body" data-section-body="typography">
                        <div class="prop-row">
                            <span class="label">Font</span>
                            <select id="text-font-family" class="prop-select" style="flex:1;">
                                <option value="">(Default)</option>
                                <option value="Inter">Inter</option>
                                <option value="Roboto">Roboto</option>
                                <option value="Open Sans">Open Sans</option>
                                <option value="Lato">Lato</option>
                                <option value="Montserrat">Montserrat</option>
                                <option value="Poppins">Poppins</option>
                                <option value="Nunito">Nunito</option>
                                <option value="Playfair Display">Playfair Display</option>
                                <option value="Merriweather">Merriweather</option>
                                <option value="Lora">Lora</option>
                                <option value="PT Serif">PT Serif</option>
                                <option value="JetBrains Mono">JetBrains Mono</option>
                                <option value="Fira Code">Fira Code</option>
                                <option value="Source Code Pro">Source Code Pro</option>
                                <option value="Bebas Neue">Bebas Neue</option>
                                <option value="Oswald">Oswald</option>
                                <option value="Raleway">Raleway</option>
                            </select>
                        </div>
                        <div class="transform-grid" style="grid-template-columns: 1fr 1fr 1fr;">
                            <div class="transform-cell">
                                <label>Size</label>
                                <input type="number" id="text-font-size" class="prop-input" value="32" min="1" step="1">
                            </div>
                            <div class="transform-cell">
                                <label>Line H</label>
                                <input type="number" id="text-line-height" class="prop-input" value="1.2" min="0.5" max="5" step="0.1">
                            </div>
                            <div class="transform-cell">
                                <label>Align</label>
                                <select id="text-align" class="prop-select">
                                    <option value="0">Left</option>
                                    <option value="1">Center</option>
                                    <option value="2">Right</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- FILL -->
                <div class="panel-section">
                    <div class="panel-section-header" data-section="fill">
                        <span class="chevron">▾</span>
                        <span class="section-title" style="flex:1;">Fill</span>
                        <button id="add-fill-btn" class="add-property-btn" title="Add Fill">+</button>
                    </div>
                    <div class="panel-section-body" id="fills-list" data-section-body="fill" style="display:flex; flex-direction:column; gap:4px;">
                        <!-- Dynamically populated by ui.ts -->
                    </div>
                </div>

                <!-- STROKE -->
                <div class="panel-section">
                    <div class="panel-section-header" data-section="stroke">
                        <span class="chevron">▾</span>
                        <span class="section-title" style="flex:1;">Stroke</span>
                        <button id="add-stroke-btn" class="add-property-btn" title="Add Stroke">+</button>
                    </div>
                    <div class="panel-section-body" id="strokes-list" data-section-body="stroke" style="display:flex; flex-direction:column; gap:4px;">
                        <!-- Dynamically populated by ui.ts -->
                    </div>
                </div>

                <!-- EFFECTS -->
                <div class="panel-section">
                    <div class="panel-section-header" data-section="effects">
                        <span class="chevron">▾</span>
                        <span class="section-title" style="flex:1;">Effects</span>
                        <button id="add-effect-btn" class="add-property-btn" title="Add Transform Effect">+</button>
                    </div>
                    <div class="panel-section-body" id="effects-list" data-section-body="effects" style="display:flex; flex-direction:column; gap:4px;">
                        <!-- Dynamically populated by ui.ts -->
                    </div>
                </div>

                <!-- APPEARANCE -->
                <div class="panel-section">
                    <div class="panel-section-header" data-section="appearance">
                        <span class="chevron">▾</span>
                        <span class="section-title">Appearance</span>
                    </div>
                    <div class="panel-section-body" data-section-body="appearance">
                        <div class="prop-row">
                            <span class="label">Layer Opacity</span>
                            <input type="number" id="opacity" class="prop-input" value="100" min="0" max="100" style="width: 48px; flex: 0 0 48px;">
                            <span class="unit">%</span>
                            <span class="header-spacer"></span>
                            <button class="icon-toggle active" id="toggle-visible" title="Visibility"><i data-lucide="eye" style="width:14px;height:14px;"></i></button>
                            <button class="icon-toggle" id="toggle-locked" title="Lock"><i data-lucide="lock" style="width:14px;height:14px;"></i></button>
                        </div>
                        <div class="prop-row">
                            <span class="label">Blend</span>
                            <select id="blend-mode" class="prop-select">
                                <option value="0">Normal</option>
                                <option value="1">Multiply</option>
                                <option value="2">Screen</option>
                                <option value="3">Overlay</option>
                                <option value="4">Darken</option>
                                <option value="5">Lighten</option>
                                <option value="6">Color Dodge</option>
                                <option value="7">Color Burn</option>
                                <option value="8">Hard Light</option>
                                <option value="9">Soft Light</option>
                                <option value="10">Difference</option>
                                <option value="11">Exclusion</option>
                                <option value="12">Hue</option>
                                <option value="13">Saturation</option>
                                <option value="14">Color</option>
                                <option value="15">Luminosity</option>
                            </select>
                        </div>
                    </div>
                </div>

                </div><!-- .properties-scroll -->

            </aside>
        </main>
        <!-- Context Menu -->
        <div id="context-menu" class="context-menu"></div>
    </div>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
